name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  selfcheck:
    name: selfcheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run --locked -- --selfcheck
      - run: cargo run --locked --no-default-features -- --selfcheck

  platform-isolation:
    name: platform isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./tools/check-platform-isolation.sh
